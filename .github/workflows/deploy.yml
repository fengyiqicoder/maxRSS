name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Ensure feeds directory exists
        run: mkdir -p feeds
      
      - name: Copy feeds if exists
        run: |
          if [ -d "feeds" ]; then
            cp -r feeds feeds-output/
          fi
        continue-on-error: true
      
      - name: Create feeds directory for upload
        run: |
          mkdir -p _site
          if [ -f "feeds/feed.xml" ]; then
            cp feeds/feed.xml _site/
          else
            echo '<?xml version="1.0" encoding="utf-8"?><rss version="2.0"><channel><title>Empty Feed</title><description>Waiting for content</description></channel></rss>' > _site/feed.xml
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
